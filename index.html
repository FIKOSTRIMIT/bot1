<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --header-blue: #3291ff;
            --header-cyan: #00c2ff;
            --playerok-blue: #3586ff;
            --text-main: #ffffff;
            --text-gray: #828282;
            --green-price: #00a651;      
            --status-green-bg: #1a8944;
            --action-bg: #1c1814;
            --action-orange: #d29922;
            --action-text: #e19d55;
            --border: #262626;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Поля ввода (Форма) */
        .form-container {
            width: 100%;
            max-width: 420px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-send {
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Стили превью (Твой дизайн) */
        .preview-label {
            color: var(--text-gray);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            width: 100%;
            max-width: 420px;
        }

        .wrapper { width: 100%; max-width: 420px; }
        .header {
            background: linear-gradient(90deg, var(--header-blue) 0%, var(--header-cyan) 100%);
            border-radius: 20px 20px 10px 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .logo { background: white; color: black; padding: 5px 10px; border-radius: 6px; font-weight: 900; }
        .logo span { color: var(--playerok-blue); }
        .card { background-color: var(--bg-card); border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .status-confirmed { background-color: var(--status-green-bg); color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; display: inline-block; }
        .price { color: var(--green-price); font-size: 24px; font-weight: 800; margin: 10px 0; }
        .action-card { background-color: var(--action-bg); border-left: 4px solid var(--action-orange); }
    </style>
</head>
<body>

    <div class="form-container">
        <label>Email получателя:</label>
        <input type="email" id="in_email" placeholder="example@mail.com">
        
        <label>Ваш ник (Продавец):</label>
        <input type="text" id="in_seller" placeholder="Fiko Store" oninput="update()">
        
        <label>Сумма (₽):</label>
        <input type="number" id="in_amount" placeholder="1300" oninput="update()">
        
        <label>Товар:</label>
        <input type="text" id="in_item" placeholder="Название товара" oninput="update()">
        
        <label>Ник покупателя:</label>
        <input type="text" id="in_buyer" placeholder="balerinceo" oninput="update()">

        <button class="btn-send" onclick="sendToBot()">ОТПРАВИТЬ ПИСЬМО</button>
    </div>

    <div class="preview-label">Предпросмотр письма:</div>

    <div class="wrapper" id="preview">
        <div class="header">
            <div>
                <h3 style="margin:0; font-size:18px;">Playerok • Сделка</h3>
                <p style="margin:5px 0 0 0; font-size:10px; opacity:0.8;">Оплата подтверждена</p>
            </div>
            <div class="logo">Player<span>ok</span></div>
        </div>

        <div class="card">
            <div style="font-weight:700;">Здравствуйте, @<span id="p_seller">Fiko Store</span></div>
        </div>

        <div class="card">
            <div class="status-confirmed">ОПЛАТА ПОДТВЕРЖДЕНА</div>
            <div class="price"><span id="p_amount">1 300</span> ₽</div>
            <div style="color:var(--text-gray); font-size:13px;">Оплата зафиксирована. Передайте товар.</div>
        </div>

        <div class="card">
            <div style="color:var(--text-gray); font-size:12px;">Товар: <b style="color:white;" id="p_item">Light Sword</b></div>
            <div style="color:var(--text-gray); font-size:12px; margin-top:5px;">Покупатель: <b style="color:white;">@<span id="p_buyer">balerinceo</span></b></div>
        </div>

        <div class="card action-card">
            <div style="color:var(--action-text); font-size:11px; font-weight:800;">ДЕЙСТВИЕ СЕЙЧАС</div>
            <div style="font-size:13px; margin-top:5px;">Передайте товар: <b>@<span id="p_buyer2">balerinceo</span></b></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Функция обновления превью "на лету"
        function update() {
            document.getElementById('p_seller').innerText = document.getElementById('in_seller').value || '...';
            document.getElementById('p_amount').innerText = document.getElementById('in_amount').value || '0';
            document.getElementById('p_item').innerText = document.getElementById('in_item').value || '...';
            document.getElementById('p_buyer').innerText = document.getElementById('in_buyer').value || '...';
            document.getElementById('p_buyer2').innerText = document.getElementById('in_buyer').value || '...';
        }

        function sendToBot() {
            let data = {
                email: document.getElementById('in_email').value,
                seller: document.getElementById('in_seller').value,
                amount: document.getElementById('in_amount').value,
                item: document.getElementById('in_item').value,
                buyer: document.getElementById('in_buyer').value
            };
            
            if(!data.email) { alert('Введите Email!'); return; }
            
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
