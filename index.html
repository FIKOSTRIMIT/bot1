<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a; --bg-card: #141414; --header-blue: #3291ff;
            --header-cyan: #00c2ff; --text-gray: #828282; --green-price: #00a651;
            --status-green-bg: #1a8944; --action-bg: #1c1814; --action-orange: #d29922;
        }
        body { background-color: var(--bg-dark); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .form { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; background: #000; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-send { width: 100%; background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Твой дизайн Playerok */
        .wrapper { width: 100%; max-width: 420px; margin: 0 auto; }
        .header { background: linear-gradient(90deg, var(--header-blue) 0%, var(--header-cyan) 100%); border-radius: 20px 20px 10px 10px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { background: white; color: black; padding: 5px 10px; border-radius: 6px; font-weight: 900; }
        .card { background-color: var(--bg-card); border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid #262626; }
        .status { background-color: var(--status-green-bg); color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; display: inline-block; }
        .price { color: var(--green-price); font-size: 24px; font-weight: 800; margin: 10px 0; }
        .action-card { background-color: var(--action-bg); border-left: 4px solid var(--action-orange); }
    </style>
</head>
<body>
    <div class="form">
        <label>Email получателя:</label>
        <input type="email" id="email" placeholder="example@mail.com">
        <label>Продавец:</label>
        <input type="text" id="seller" placeholder="Fiko Store" oninput="update()">
        <label>Сумма (₽):</label>
        <input type="number" id="amount" placeholder="1300" oninput="update()">
        <label>Товар:</label>
        <input type="text" id="item" placeholder="Название товара" oninput="update()">
        <label>Покупатель:</label>
        <input type="text" id="buyer" placeholder="balerinceo" oninput="update()">
        <button class="btn-send" onclick="send()">ОТПРАВИТЬ ПИСЬМО</button>
    </div>

    <div class="wrapper">
        <div class="header">
            <div><h3 style="margin:0;">Playerok • Сделка</h3></div>
            <div class="logo">Player<span style="color:#3586ff;">ok</span></div>
        </div>
        <div class="card"><b>Здравствуйте, @<span id="p_seller">Fiko Store</span></b></div>
        <div class="card">
            <div class="status">ОПЛАТА ПОДТВЕРЖДЕНА</div>
            <div class="price"><span id="p_amount">1300</span> ₽</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function update() {
            document.getElementById('p_seller').innerText = document.getElementById('seller').value || '...';
            document.getElementById('p_amount').innerText = document.getElementById('amount').value || '0';
        }
        function send() {
            let data = {
                email: document.getElementById('email').value,
                seller: document.getElementById('seller').value,
                amount: document.getElementById('amount').value,
                item: document.getElementById('item').value,
                buyer: document.getElementById('buyer').value
            };
            if(!data.email) return alert('Введите почту!');
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
