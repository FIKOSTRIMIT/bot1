<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #0d1117); color: var(--tg-theme-text-color, white); font-family: sans-serif; padding: 20px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 12px; background: #161b22; border: 1px solid #30363d; 
            border-radius: 10px; color: white; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #58a6ff; }
        button { 
            width: 100%; padding: 15px; background: #238636; border: none; 
            border-radius: 10px; color: white; font-weight: bold; font-size: 16px; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="field">
        <label>Email получателя</label>
        <input type="email" id="email" placeholder="example@mail.ru">
    </div>
    <div class="field">
        <label>Ник продавца</label>
        <input type="text" id="seller" placeholder="Fiko Store">
    </div>
    <div class="field">
        <label>Сумма сделки (₽)</label>
        <input type="text" id="amount" placeholder="1 300">
    </div>
    <div class="field">
        <label>Название товара</label>
        <input type="text" id="item" placeholder="🗡Light Sword">
    </div>
    <div class="field">
        <label>Ник покупателя</label>
        <input type="text" id="buyer" placeholder="balerinceo">
    </div>

    <button id="main_btn">ОТПРАВИТЬ ПИСЬМО</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        document.getElementById("main_btn").addEventListener("click", () => {
            let data = {
                email: document.getElementById("email").value,
                seller: document.getElementById("seller").value,
                amount: document.getElementById("amount").value,
                item: document.getElementById("item").value,
                buyer: document.getElementById("buyer").value
            };
            
            if(!data.email || !data.amount) {
                alert("Заполни хотя бы почту и сумму!");
                return;
            }

            tg.sendData(json.stringify(data));
        });
    </script>
</body>
</html>
